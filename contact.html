    <main class="container" style="padding: 200px 60px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 100px;">
            <div class="reveal">
                <h1 class="section-title" style="text-align: left;">LEAVE A<br>LEGACY</h1>
                <p style="font-size: 1.5rem; margin-bottom: 40px; color: var(--text-muted);">Have an idea that defies

                <div style="display: flex; gap: 30px;">

                    style="width: 100%; padding: 25px; border: none; background: #f5f5f5; border-radius: 20px; font-family: inherit; font-weight: 600;">
                <textarea rows="6" placeholder="MESSAGE"
                    style="width: 100%; padding: 25px; border: none; background: #f5f5f5; border-radius: 20px; font-family: inherit; font-weight: 600; resize: none;"></textarea>
